<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Online Library Management System</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div class="container">

        <div class="login-box">

            <div class="left">

                <h1>Welcome Back!</h1>

                <p>

                    Login to access your Online Library
                    Management System account.

                </p>

                <img src="images/login-library.png" alt="Library">

            </div>

            <div class="right">

                <h2>Login</h2>

                <form id="loginForm">

                    <div class="input-box">

                        <i class="fa fa-envelope"></i>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter Email"
                            required>

                    </div>

                    <div class="input-box">

                        <i class="fa fa-lock"></i>

                        <input
                            type="password"
                            id="password"
                            placeholder="Enter Password"
                            required>

                        <i
                            class="fa fa-eye toggle-password"
                            id="togglePassword"></i>

                    </div>

                    <div class="options">

                        <label>

                            <input type="checkbox">

                            Remember Me

                        </label>

                        <a href="#">Forgot Password?</a>

                    </div>

                    <button
                        type="submit"
                        class="login-btn">

                        Login

                    </button>

                </form>

                <div class="divider">

                    <span>OR</span>

                </div>

                <div class="social-login">

                    <button class="google">

                        <i class="fab fa-google"></i>

                        Google

                    </button>

                    <button class="facebook">

                        <i class="fab fa-facebook-f"></i>

                        Facebook

                    </button>

                </div>

                <p class="register">

                    Don't have an account?

                    <a href="register.html">

                        Register Here

                    </a>

                </p>

                <p class="home">

                    <a href="index.html">

                        ← Back to Home

                    </a>

                </p>

            </div>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
